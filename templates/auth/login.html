<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ログイン - pjkeep</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-12 col-sm-8 col-md-5">
      <div class="card shadow-sm">
        <div class="card-body p-4">
          <h4 class="mb-4">pjkeep ログイン</h4>
          <div id="alert-box"></div>
          <div class="mb-3">
            <label class="form-label" for="username">ユーザー名</label>
            <input type="text" id="username" class="form-control" autocomplete="username">
          </div>
          <div class="mb-4">
            <label class="form-label" for="password">パスワード</label>
            <input type="password" id="password" class="form-control" autocomplete="current-password">
          </div>
          <button class="btn btn-primary w-100 mb-3" id="btn-login">ログイン</button>
          <div class="text-center small text-muted">
            アカウントをお持ちでない方は <a href="/register">新規登録</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
<script>
$('#btn-login').on('click', function() {
  const username = $('#username').val().trim();
  const password = $('#password').val();
  if (!username || !password) {
    $('#alert-box').html('<div class="alert alert-warning">ユーザー名とパスワードを入力してください</div>');
    return;
  }
  $(this).prop('disabled', true).text('ログイン中...');
  $.ajax({
    url: '/api/auth/login',
    method: 'POST',
    contentType: 'application/json',
    data: JSON.stringify({ username, password }),
    success: function() {
      const next = new URLSearchParams(window.location.search).get('next') || '/';
      window.location.href = next;
    },
    error: function(xhr) {
      $('#alert-box').html(`<div class="alert alert-danger">${xhr.responseJSON?.error || 'ログインに失敗しました'}</div>`);
      $('#btn-login').prop('disabled', false).text('ログイン');
    }
  });
});
$('#password').on('keydown', function(e) { if (e.key === 'Enter') $('#btn-login').click(); });
</script>
</body>
</html>
