<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}帳簿{% endblock %} - pjkeep</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<nav class="navbar navbar-expand-sm navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand" href="/">pjkeep</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navmenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navmenu">
      <ul class="navbar-nav me-auto">
        <li class="nav-item"><a class="nav-link {% if request.endpoint=='entry' %}active{% endif %}" href="/entry">記帳</a></li>
        <li class="nav-item"><a class="nav-link {% if request.endpoint=='journal' %}active{% endif %}" href="/journal">仕訳帳</a></li>
        <li class="nav-item"><a class="nav-link {% if request.endpoint=='report' %}active{% endif %}" href="/report">財務諸表</a></li>
        <li class="nav-item"><a class="nav-link {% if request.endpoint=='accounts' %}active{% endif %}" href="/accounts">勘定科目</a></li>
        <li class="nav-item"><a class="nav-link {% if request.endpoint=='import_page' %}active{% endif %}" href="/import">バッチインポート</a></li>
      </ul>
      <ul class="navbar-nav">
        <li class="nav-item"><a class="nav-link {% if request.endpoint=='init' %}active{% endif %}" href="/init">設定</a></li>
      </ul>
    </div>
  </div>
</nav>

<div class="container-fluid py-3">
  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
