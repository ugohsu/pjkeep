services:
  app:
    build: .
    user: "${APP_UID:-1000}:${APP_GID:-1000}"
    restart: unless-stopped
    volumes:
      - ./data:/app/data
    env_file: .env
    expose:
      - "8000"

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "5000:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
